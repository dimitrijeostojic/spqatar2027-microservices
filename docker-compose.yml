services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "DimitrijeIPIS2026"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - spqatar-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P DimitrijeIPIS2026 -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - spqatar-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - spqatar-network
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  auth-service:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=AuthDB;User Id=sa;Password=DimitrijeIPIS2026;TrustServerCertificate=True
      - Jwt__SecretKey=KG+8eq3WYLLKv26GTW5S+q6BQvaPefH/yMmMNwCYMzo=
      - Jwt__Issuer=SPQatar2027
      - Jwt__Audience=SPQatar2027
    ports:
      - "5001:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - spqatar-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null && echo healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  stadium-service:
    build:
      context: ./StadiumService
      dockerfile: Dockerfile
    container_name: stadium-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDb__ConnectionString=mongodb://mongodb:27017
      - MongoDb__DatabaseName=StadiumDB
      - MongoDb__CollectionName=stadiums
      - Jwt__SecretKey=KG+8eq3WYLLKv26GTW5S+q6BQvaPefH/yMmMNwCYMzo=
      - Jwt__Issuer=SPQatar2027
      - Jwt__Audience=SPQatar2027
    ports:
      - "5004:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - spqatar-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null && echo healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  team-service:
    build:
      context: ./TeamService
      dockerfile: Dockerfile
    container_name: team-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=TeamDB;User Id=sa;Password=DimitrijeIPIS2026;TrustServerCertificate=True
      - Jwt__SecretKey=KG+8eq3WYLLKv26GTW5S+q6BQvaPefH/yMmMNwCYMzo=
      - Jwt__Issuer=SPQatar2027
      - Jwt__Audience=SPQatar2027
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
    ports:
      - "5002:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - spqatar-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null && echo healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  match-service:
    build:
      context: ./MatchService
      dockerfile: Dockerfile
    container_name: match-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=MatchDB;User Id=sa;Password=DimitrijeIPIS2026;TrustServerCertificate=True
      - Jwt__SecretKey=KG+8eq3WYLLKv26GTW5S+q6BQvaPefH/yMmMNwCYMzo=
      - Jwt__Issuer=SPQatar2027
      - Jwt__Audience=SPQatar2027
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - ServiceUrls__TeamService=http://team-service:8080/
      - ServiceUrls__StadiumService=http://stadium-service:8080/
    ports:
      - "5003:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      team-service:
        condition: service_healthy
      stadium-service:
        condition: service_healthy
    networks:
      - spqatar-network
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null && echo healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  gateway:
    build:
      context: ./Gateway
      dockerfile: Dockerfile
    container_name: gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__SecretKey=KG+8eq3WYLLKv26GTW5S+q6BQvaPefH/yMmMNwCYMzo=
      - Jwt__Issuer=SPQatar2027
      - Jwt__Audience=SPQatar2027
    ports:
      - "5000:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      team-service:
        condition: service_healthy
      match-service:
        condition: service_healthy
      stadium-service:
        condition: service_healthy
    networks:
      - spqatar-network
    restart: on-failure

volumes:
  sqlserver_data:
  mongodb_data:
  rabbitmq_data:

networks:
  spqatar-network:
    driver: bridge
